services:
  app:
    environment:
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION}
      - MONGO_USERNAME=${PROD_MONGO_USERNAME}
      - MONGO_PASSWORD=${PROD_MONGO_PASSWORD}
      - MONGO_HOST=mongo
      - MONGO_DB=proddb
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${PROD_REDIS_PASSWORD}
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
        reservations:
          memory: 256M
          cpus: '0.25'

  mongo:
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${PROD_MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${PROD_MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=proddb
    volumes:
      - /data/mongodb:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'

  redis:
    command: redis-server --requirepass ${PROD_REDIS_PASSWORD} --appendonly yes --appendfsync everysec
    volumes:
      - /data/redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${PROD_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
