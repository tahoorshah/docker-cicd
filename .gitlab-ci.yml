stages:
  - build
  - test
  - security
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  COMPOSE_PROJECT_NAME: docker-cicd-lab
  TRIVY_NO_PROGRESS: "true"
  TRIVY_CACHE_DIR: ".trivycache"

image: docker:24

services:
  - docker:24-dind

default:
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY

# ─────────────────────────────────────────
# BUILD
# ─────────────────────────────────────────
build_and_tag:
  stage: build
  script:
    - echo "Building Docker image..."
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
    - |
      if [ "$CI_COMMIT_REF_NAME" = "main" ]; then
        git config --global user.email "ci@gitlab.com"
        git config --global user.name "GitLab CI"
        git add VERSION
        git commit -m "Bump version [skip ci]" || echo "No version changes"
        git push https://gitlab-ci-token:${CI_PUSH_TOKEN}@gitlab.com/$CI_PROJECT_PATH.git HEAD:$CI_COMMIT_REF_NAME || echo "Could not push version update"
      fi
  artifacts:
    paths:
      - VERSION
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# ─────────────────────────────────────────
# TEST
# ─────────────────────────────────────────
test_application:
  stage: test
  needs:
    - job: build_and_tag
  script:
    - apk add --no-cache docker-compose
    - docker-compose -f docker-compose.yml up -d
    - |
      echo "Waiting for app to be healthy..."
      for i in $(seq 1 30); do
        docker-compose exec -T app curl -sf http://localhost:3000/health && break
        echo "Attempt $i/30, retrying in 5s..."
        sleep 5
      done
    - docker-compose exec -T app npm test
  after_script:
    - docker-compose down -v
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# ─────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────
security_comprehensive_scan:
  stage: security
  image: aquasec/trivy:latest
  before_script:
    - echo "Trivy image — no login needed for scanning"
  script:
    - echo "Scanning application image for vulnerabilities..."

    # Human readable table output in logs
    - trivy image --severity HIGH,CRITICAL --format table $IMAGE_TAG

    # GitLab Security dashboard compatible report
    - |
      trivy image \
        --severity HIGH,CRITICAL \
        --format template \
        --template "@/contrib/gitlab.tpl" \
        --output gl-container-scanning-report.json \
        $IMAGE_TAG

    # Hard fail on CRITICAL vulnerabilities
    - trivy image --exit-code 1 --severity CRITICAL $IMAGE_TAG

    # Dockerfile misconfiguration scan
    - trivy config --severity HIGH,CRITICAL .

  artifacts:
    paths:
      - gl-container-scanning-report.json
    expire_in: 1 week
    reports:
      container_scanning: gl-container-scanning-report.json
  cache:
    paths:
      - .trivycache/
  needs:
    - job: test_application
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# ─────────────────────────────────────────
# DEPLOY — STAGING
# ─────────────────────────────────────────
deploy_staging:
  stage: deploy
  image: docker:24
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
    - apk add --no-cache docker-compose openssh-client
  script:
    - export APP_VERSION=$(cat VERSION)
    - echo "Deploying to staging..."
    - docker-compose -f docker-compose.yml -f docker-compose.staging.yml up -d
    - |
      echo "Waiting for app to be healthy..."
      for i in $(seq 1 30); do
        docker-compose exec -T app curl -sf http://localhost:3000/health && break
        echo "Attempt $i/30, retrying in 5s..."
        sleep 5
      done
    - docker-compose ps
    - echo "Staging deployment completed successfully!"
    - |
      if [ -n "$NOTIFICATION_WEBHOOK" ]; then
        curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"Staging deploy successful — $CI_PROJECT_NAME v$(cat VERSION)\"}" \
          $NOTIFICATION_WEBHOOK || echo "Notification failed"
      fi
  environment:
    name: staging
    url: http://staging.example.com:3001
  needs:
    - job: test_application
    - job: security_comprehensive_scan
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

# ─────────────────────────────────────────
# DEPLOY — PRODUCTION
# ─────────────────────────────────────────
deploy_production:
  stage: deploy
  image: docker:24
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY
    - apk add --no-cache docker-compose openssh-client
  script:
    - export APP_VERSION=$(cat VERSION)
    - echo "Deploying to production..."
    - docker-compose -f docker-compose.yml -f docker-compose.production.yml up -d
    - |
      echo "Waiting for app to be healthy..."
      for i in $(seq 1 30); do
        docker-compose exec -T app curl -sf http://localhost:3000/health && break
        echo "Attempt $i/30, retrying in 5s..."
        sleep 5
      done
    - docker-compose ps
    - echo "Production deployment completed successfully!"
    - |
      if [ -n "$NOTIFICATION_WEBHOOK" ]; then
        curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"Production deploy successful — $CI_PROJECT_NAME v$(cat VERSION)\"}" \
          $NOTIFICATION_WEBHOOK || echo "Notification failed"
      fi
  environment:
    name: production
    url: http://production.example.com
  needs:
    - job: deploy_staging
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
